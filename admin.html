<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — xudojjjnik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b10; --bg2: #0d1119; --surface: #111722; --surface2: #161d2b;
      --border: rgba(255,255,255,0.07); --accent: #00e5ff; --accent2: #7b61ff;
      --text: #e8edf5; --muted: #9aa5bb; --danger: #ef4444;
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; min-height: 100vh; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.05) 0%, transparent 60%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 400px; position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }
    .login-logo { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .login-sub { color: var(--muted); font-size: 13px; margin-bottom: 36px; }
    .login-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .login-input {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 16px; color: var(--text); font-family: var(--font-body); font-size: 15px;
      outline: none; transition: border-color 0.2s; margin-bottom: 20px;
    }
    .login-input:focus { border-color: rgba(0,229,255,0.3); }
    .login-btn {
      width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px;
      padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s; letter-spacing: -0.2px;
    }
    .login-btn:hover { background: #fff; }
    .login-error { display: none; margin-top: 16px; padding: 12px 16px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; font-size: 13px; color: #fca5a5; }
    .login-error.show { display: block; }

    /* ADMIN LAYOUT */
    .admin-wrap { display: none; min-height: 100vh; }
    .admin-wrap.visible { display: block; }

    .admin-header {
      position: sticky; top: 0; z-index: 50; background: rgba(8,11,16,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 16px 5%; display: flex; align-items: center; justify-content: space-between;
    }
    .admin-logo { font-family: var(--font-display); font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .admin-logo span { color: var(--accent); }
    .admin-header-right { display: flex; align-items: center; gap: 16px; }
    .admin-site-link { color: var(--muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .admin-site-link:hover { color: var(--text); }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px;
      border-radius: 7px; font-size: 13px; cursor: pointer; font-family: var(--font-body); transition: all 0.2s;
    }
    .logout-btn:hover { border-color: rgba(239,68,68,0.4); color: #fca5a5; }

    .admin-main { max-width: 1100px; margin: 0 auto; padding: 48px 5%; }

    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 48px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .stat-card-num { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
    .stat-card-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .admin-section-title { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 20px; }

    .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-tab {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: none; color: var(--muted); font-family: var(--font-body); transition: all 0.2s;
    }
    .filter-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .filter-tab.active { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.3); color: var(--accent); }

    .reviews-table { display: flex; flex-direction: column; gap: 12px; }

    .review-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px 24px; display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start;
      transition: border-color 0.2s;
    }
    .review-row:hover { border-color: rgba(255,255,255,0.1); }
    .rr-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .rr-name { font-weight: 600; font-size: 14px; }
    .rr-stars { color: #f59e0b; font-size: 13px; letter-spacing: 1px; }
    .rr-case { padding: 3px 10px; background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.15); border-radius: 100px; font-size: 11px; color: var(--accent); font-weight: 500; }
    .rr-date { font-size: 12px; color: var(--muted); }
    .rr-text { font-size: 14px; color: var(--muted); line-height: 1.6; font-weight: 300; }
    .delete-btn {
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: var(--font-body); transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }
    .delete-btn:disabled { opacity: 0.4; cursor: default; }

    .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); font-size: 14px; }
    .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

    .loading-msg { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

    @media (max-width: 700px) {
      .admin-stats { grid-template-columns: repeat(2, 1fr); }
      .review-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">xudojjjnik <span style="color:var(--accent)">·</span> admin</div>
    <div class="login-sub">Панель управления отзывами</div>
    <label class="login-label">Пароль</label>
    <input type="password" class="login-input" id="passwordInput" placeholder="Введите пароль" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-error" id="loginError">Неверный пароль</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <header class="admin-header">
    <div class="admin-logo">xudojjjnik <span>· admin</span></div>
    <div class="admin-header-right">
      <a href="index.html" class="admin-site-link">← На сайт</a>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
  </header>

  <main class="admin-main">

    <div class="admin-stats" id="adminStats">
      <div class="stat-card"><div class="stat-card-num" id="totalCount">—</div><div class="stat-card-label">Всего отзывов</div></div>
      <div class="stat-card"><div class="stat-card-num" id="avgRating">—</div><div class="stat-card-label">Средний рейтинг</div></div>
      <div class="stat-card"><div class="stat-card-num" id="fiveStarCount">—</div><div class="stat-card-label">Отзывов 5★</div></div>
      <div class="stat-card"><div class="stat-card-num" id="latestCase">—</div><div class="stat-card-label">Последний проект</div></div>
    </div>

    <div class="admin-section-title">Все отзывы</div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-case="all">Все</button>
      <button class="filter-tab" data-case="manicure">Маникюр</button>
      <button class="filter-tab" data-case="shop">Магазин</button>
      <button class="filter-tab" data-case="aibots">AI-агентство</button>
      <button class="filter-tab" data-case="bfl">Лига</button>
    </div>

    <div class="reviews-table" id="reviewsTable">
      <div class="loading-msg">Загрузка...</div>
    </div>

  </main>
</div>

<script>
  const SUPABASE_URL = 'https://obbykalanloczcybqhim.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iYnlrYWxhbmxvY3pjeWJxaGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDUzNzgsImV4cCI6MjA4ODkyMTM3OH0.pIYTuJzOiiMdju9NkNU_qYJfY51fRRzG1GQNwskwjOY';

  // ── ПАРОЛЬ — смени на свой ──────────────────────────────────────────────────
  const ADMIN_PASSWORD = 'xudojjjnik2026';

  const CASE_LABELS = {
    manicure: 'Маникюр',
    shop:     'Магазин',
    aibots:   'AI-агентство',
    bfl:      'Лига',
  };

  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
      },
      ...options,
    });
    if (!res.ok) throw new Error(await res.text());
    return res.status === 204 ? null : res.json();
  }

  // ── AUTH ───────────────────────────────────────────────────────────────────
  let authed = sessionStorage.getItem('admin_auth') === '1';

  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').classList.add('visible');
    loadAll();
  }

  if (authed) showAdmin();

  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  function tryLogin() {
    const val = document.getElementById('passwordInput').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      authed = true;
      showAdmin();
    } else {
      document.getElementById('loginError').classList.add('show');
      document.getElementById('passwordInput').value = '';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  });

  // ── DATA ───────────────────────────────────────────────────────────────────
  let allReviews = [];
  let activeFilter = 'all';

  async function loadAll() {
    try {
      allReviews = await sbFetch('reviews?order=created_at.desc');
      renderStats();
      renderTable();
    } catch(e) {
      document.getElementById('reviewsTable').innerHTML = '<div class="loading-msg" style="color:rgba(239,68,68,0.7)">Ошибка загрузки</div>';
    }
  }

  function renderStats() {
    const total = allReviews.length;
    const avg   = total ? (allReviews.reduce((s, r) => s + r.stars, 0) / total).toFixed(1) : '—';
    const five  = allReviews.filter(r => r.stars === 5).length;
    const last  = total ? (CASE_LABELS[allReviews[0].case_id] || allReviews[0].case_id) : '—';
    document.getElementById('totalCount').textContent   = total;
    document.getElementById('avgRating').textContent    = total ? avg + ' ★' : '—';
    document.getElementById('fiveStarCount').textContent = five;
    document.getElementById('latestCase').textContent   = last;
  }

  function renderTable() {
    const filtered = activeFilter === 'all' ? allReviews : allReviews.filter(r => r.case_id === activeFilter);
    const table = document.getElementById('reviewsTable');

    if (!filtered.length) {
      table.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>Отзывов пока нет</div>';
      return;
    }

    table.innerHTML = '';
    filtered.forEach(r => {
      const row = document.createElement('div');
      row.className = 'review-row';
      row.dataset.id = r.id;
      row.innerHTML = `
        <div>
          <div class="rr-meta">
            <div class="rr-name">${esc(r.name)}</div>
            <div class="rr-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
            <div class="rr-case">${CASE_LABELS[r.case_id] || r.case_id}</div>
            <div class="rr-date">${fmtDate(r.created_at)}</div>
          </div>
          <div class="rr-text">${esc(r.text)}</div>
        </div>
        <button class="delete-btn" data-id="${r.id}">Удалить</button>`;
      table.appendChild(row);
    });

    table.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Удалить этот отзыв?')) return;
        btn.disabled = true;
        btn.textContent = '...';
        try {
          await sbFetch(`reviews?id=eq.${btn.dataset.id}`, { method: 'DELETE' });
          allReviews = allReviews.filter(r => String(r.id) !== String(btn.dataset.id));
          renderStats();
          renderTable();
        } catch {
          btn.disabled = false;
          btn.textContent = 'Удалить';
          alert('Ошибка удаления');
        }
      });
    });
  }

  // Фильтры
  document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.case;
    renderTable();
  });

  const esc     = s => String(s).replace(/</g, '&lt;');
  const fmtDate = s => new Date(s).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
</script>
</body>
</html>
